name: KAMIS 가격 데이터 수집

on:
  schedule:
    - cron: "0 1 * * *"   # 매일 오전 10시 (KST = UTC+9 → UTC 01:00)
  workflow_dispatch:        # 수동 실행 가능

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 패키지 설치
        run: pip install requests pyyaml

      - name: 데이터 수집 실행
        env:
          KAMIS_CERT_KEY: ${{ secrets.KAMIS_CERT_KEY }}
          KAMIS_CERT_ID:  ${{ secrets.KAMIS_CERT_ID }}
        run: python scripts/collect_to_json.py

      - name: 변경사항 커밋 및 푸시
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Data/kamis_latest.json
          git diff --staged --quiet || git commit -m "data: KAMIS 가격 자동 수집 $(date +'%Y-%m-%d')"
          git push
